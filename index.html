<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lotto PRO v1 FINAL</title>
  <style>
    :root { --primary: #2c3e50; --accent: #3498db; --success: #27ae60; --danger: #e74c3c; --bg: #f4f7f6; }
    body { font-family: 'Sarabun', sans-serif; background: var(--bg); padding: 10px; margin: 0; }
    .container { max-width: 500px; margin: 0 auto; }
    .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 15px; }
    h2 { text-align: center; color: var(--primary); font-size: 20px; margin-bottom: 15px; }
    
    .tabs { display: flex; gap: 5px; margin-bottom: 15px; }
    .tab-btn { flex: 1; padding: 10px; border: none; background: #ddd; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .tab-btn.active { background: var(--accent); color: white; }

    .form-group { margin-bottom: 12px; }
    label { display: block; font-size: 13px; font-weight: bold; margin-bottom: 4px; color: #666; }
    input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
    
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
    .btn-submit { width: 100%; padding: 15px; background: var(--success); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td { padding: 8px; border: 1px solid #eee; text-align: center; }
    th { background: #f8f9fa; }

    /* กฎสีตามยอดเงิน */
    .bg-red { background: #ffcccc !important; color: #b30000; font-weight: bold; }
    .bg-yellow { background: #fff4cc !important; color: #856404; font-weight: bold; }
    .bg-green { background: #d4edda !important; color: #155724; }

    .toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 20px; display: none; font-size: 14px; }
  </style>
</head>
<body>

<div class="container">
  <div class="card">
    <h2>📝 บันทึกหวย PRO (FINAL)</h2>
    <div class="tabs">
      <button class="tab-btn active" onclick="showTab('entry')">คีย์ข้อมูล</button>
      <button class="tab-btn" onclick="showTab('summary'); loadSummary();">สรุปยอด</button>
      <button class="tab-btn" onclick="showTab('top'); loadTopNumbers();">ยอดนิยม</button>
    </div>

    <div id="tab-entry" class="tab-content">
      <div class="form-group">
        <label>ชื่อลูกค้า</label>
        <input type="text" id="customerName" placeholder="ชื่อลูกค้า">
      </div>
      <div class="grid-3">
        <div class="form-group"><label>เลข</label><input type="text" id="number" inputmode="numeric"></div>
        <div class="form-group" style="grid-column: span 2;">
          <label>ประเภท</label>
          <select id="type">
            <option>2ตัวตรง</option><option>2ตัวกลับ</option><option>3ตัวตรง</option><option>3ตัวกลับ</option><option>เลขวิ่ง</option>
          </select>
        </div>
      </div>
      <div class="grid-3">
        <div class="form-group"><label>บน</label><input type="number" id="top"></div>
        <div class="form-group"><label>ล่าง</label><input type="number" id="bottom"></div>
        <div class="form-group"><label>โต๊ด</label><input type="number" id="tod"></div>
      </div>
      <button class="btn-submit" id="btnSubmit" onclick="submitData()">บันทึกข้อมูล</button>
    </div>

    <div id="tab-summary" class="tab-content" style="display:none;">
      <table id="summaryTable">
        <thead><tr><th>เลข</th><th>บน</th><th>ล่าง</th><th>โต๊ด</th><th>รวม</th></tr></thead>
        <tbody id="summaryBody"></tbody>
      </table>
    </div>

    <div id="tab-top" class="tab-content" style="display:none;">
      <div id="topList"></div>
    </div>
  </div>
</div>

<div id="toast" class="toast"></div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbwU0Bk4XlVJ1T2kUlcuQEmTsXO9x9CVCgL87R2AQCzuH9UsqT6qLSfFjAAJOF2UY37l/exec";

  function showTab(name) {
    document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + name).style.display = 'block';
    event.currentTarget.classList.add('active');
  }

  async function submitData() {
    const btn = document.getElementById('btnSubmit');
    const data = {
      customerName: document.getElementById('customerName').value,
      number: document.getElementById('number').value,
      type: document.getElementById('type').value,
      top: document.getElementById('top').value || 0,
      bottom: document.getElementById('bottom').value || 0,
      tod: document.getElementById('tod').value || 0
    };

    if(!data.number) return alert("กรุณาใส่เลข");
    
    btn.disabled = true; btn.innerText = "กำลังบันทึก...";
    try {
      await fetch(API_URL, { method: "POST", mode: "no-cors", body: JSON.stringify(data) });
      showToast("บันทึกสำเร็จ ✓");
      document.getElementById('number').value = "";
      document.getElementById('top').value = "";
      document.getElementById('bottom').value = "";
      document.getElementById('tod').value = "";
      document.getElementById('number').focus();
    } catch (e) { showToast("Error!"); }
    btn.disabled = false; btn.innerText = "บันทึกข้อมูล";
  }

  async function loadSummary() {
    const body = document.getElementById('summaryBody');
    body.innerHTML = "<tr><td colspan='5'>กำลังโหลด...</td></tr>";
    try {
      const res = await fetch(API_URL + "?action=getSummary");
      const json = await res.json();
      body.innerHTML = "";
      json.data.forEach(item => {
        let cls = item.total >= 7000 ? "bg-red" : (item.total >= 4000 ? "bg-yellow" : "bg-green");
        body.innerHTML += `<tr class="${cls}"><td>${item.number}</td><td>${item.top}</td><td>${item.bottom}</td><td>${item.tod}</td><td>${item.total}</td></tr>`;
      });
    } catch (e) { body.innerHTML = "โหลดผิดพลาด"; }
  }

  async function loadTopNumbers() {
    const div = document.getElementById('topList');
    div.innerHTML = "กำลังโหลด...";
    try {
      const res = await fetch(API_URL + "?action=getTopNumbers");
      const json = await res.json();
      div.innerHTML = json.data.map((item, i) => `<div style="padding:10px; border-bottom:1px solid #eee;"><b>${i+1}. เลข ${item.number}</b> - ยอดรวม ${item.total} บาท</div>`).join("");
    } catch (e) { div.innerHTML = "โหลดผิดพลาด"; }
  }

  function showToast(m) {
    const t = document.getElementById('toast');
    t.innerText = m; t.style.display = 'block';
    setTimeout(() => t.style.display = 'none', 3000);
  }
</script>
</body>
</html>
