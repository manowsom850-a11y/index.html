<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ระบบจดบันทึกหวย PRO v1</title>
  <style>
    :root {
      --primary: #2c3e50;
      --accent: #3498db;
      --success: #27ae60;
      --warning: #f1c40f;
      --danger: #e74c3c;
      --bg: #f4f7f6;
      --card-bg: #ffffff;
      --text: #333;
      --border: #ddd;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: var(--text); padding: 15px; }

    .container { max-width: 800px; margin: 0 auto; }
    .card { background: var(--card-bg); padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 20px; }
    
    h2 { text-align: center; margin-bottom: 20px; color: var(--primary); font-size: 22px; }
    
    /* Tabs */
    .tabs { display: flex; gap: 5px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 5px; }
    .tab-btn { flex: 1; padding: 10px; border: none; background: #e0e0e0; cursor: pointer; border-radius: 8px; font-weight: bold; white-space: nowrap; transition: 0.3s; }
    .tab-btn.active { background: var(--accent); color: white; }

    /* Form */
    .form-group { margin-bottom: 15px; }
    label { display: block; font-size: 14px; font-weight: 600; margin-bottom: 5px; color: #555; }
    input, select, textarea { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 10px; font-size: 16px; outline: none; }
    input:focus { border-color: var(--accent); }
    
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
    .btn-submit { width: 100%; padding: 15px; background: var(--success); color: white; border: none; border-radius: 10px; font-size: 18px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

    /* Table & Summary */
    .table-container { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; font-size: 14px; }
    th, td { padding: 12px; border: 1px solid #eee; text-align: center; }
    th { background: #f8f9fa; color: #666; }

    /* Color Rules */
    .bg-red { background-color: #ffcccc !important; color: #b30000; font-weight: bold; }
    .bg-yellow { background-color: #fff4cc !important; color: #856404; font-weight: bold; }
    .bg-green { background-color: #d4edda !important; color: #155724; font-weight: bold; }

    /* Search & Top Numbers */
    .search-box { display: flex; gap: 10px; margin-bottom: 15px; }
    .search-box input { flex: 1; }
    .btn-search { padding: 0 20px; background: var(--accent); color: white; border: none; border-radius: 10px; cursor: pointer; }

    .top-item { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #eee; }
    .top-rank { font-weight: bold; color: var(--accent); width: 30px; }
    .top-num { flex: 1; font-weight: bold; font-size: 18px; }
    .top-total { font-weight: bold; color: var(--danger); }

    .loading { text-align: center; padding: 20px; color: #666; font-style: italic; }
    #toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 10px 20px; border-radius: 20px; display: none; z-index: 1000; }
  </style>
</head>
<body>

<div class="container">
  <div class="card">
    <h2>📝 ระบบจดบันทึกหวย PRO</h2>
    
    <div class="tabs">
      <button class="tab-btn active" onclick="showTab('entry')">คีย์ข้อมูล</button>
      <button class="tab-btn" onclick="showTab('summary'); loadSummary();">สรุปยอด</button>
      <button class="tab-btn" onclick="showTab('search');">ค้นหา/วิเคราะห์</button>
    </div>

    <!-- Tab 1: คีย์ข้อมูล -->
    <div id="tab-entry" class="tab-content">
      <div class="form-group">
        <label>ชื่อลูกค้า</label>
        <input type="text" id="customerName" placeholder="ระบุชื่อลูกค้า" autocomplete="off">
      </div>
      <div class="grid-3">
        <div class="form-group">
          <label>เลขที่ซื้อ</label>
          <input type="text" id="number" placeholder="00-999" inputmode="numeric">
        </div>
        <div class="form-group" style="grid-column: span 2;">
          <label>ประเภท</label>
          <select id="type">
            <option value="2ตัวตรง">2ตัวตรง</option>
            <option value="2ตัวกลับ">2ตัวกลับ</option>
            <option value="3ตัวตรง">3ตัวตรง</option>
            <option value="3ตัวกลับ">3ตัวกลับ</option>
            <option value="3ตัว 3กลับ">3ตัว 3กลับ</option>
            <option value="3ตัว 6กลับ">3ตัว 6กลับ</option>
            <option value="เลขวิ่ง">เลขวิ่ง</option>
          </select>
        </div>
      </div>
      <div class="grid-3">
        <div class="form-group">
          <label>บน (บาท)</label>
          <input type="number" id="top" placeholder="0" min="0">
        </div>
        <div class="form-group">
          <label>ล่าง (บาท)</label>
          <input type="number" id="bottom" placeholder="0" min="0">
        </div>
        <div class="form-group">
          <label>โต๊ด (บาท)</label>
          <input type="number" id="tod" placeholder="0" min="0">
        </div>
      </div>
      <div class="grid-3">
        <div class="form-group" style="grid-column: span 1;">
          <label>เลขอั้น</label>
          <input type="text" id="limitPrice" placeholder="เช่น ครึ่งราคา">
        </div>
        <div class="form-group" style="grid-column: span 2;">
          <label>หมายเหตุ</label>
          <input type="text" id="note" placeholder="ระบุเพิ่มเติม">
        </div>
      </div>
      <button class="btn-submit" id="submitBtn" onclick="submitData()">บันทึกข้อมูล</button>
    </div>

    <!-- Tab 2: สรุปยอด -->
    <div id="tab-summary" class="tab-content" style="display:none;">
      <div class="table-container">
        <table id="summaryTable">
          <thead>
            <tr>
              <th>เลข</th>
              <th>บน</th>
              <th>ล่าง</th>
              <th>โต๊ด</th>
              <th>รวม</th>
            </tr>
          </thead>
          <tbody id="summaryBody"></tbody>
        </table>
      </div>
      <div id="summaryLoading" class="loading" style="display:none;">กำลังโหลดข้อมูล...</div>
    </div>

    <!-- Tab 3: ค้นหา/วิเคราะห์ -->
    <div id="tab-search" class="tab-content" style="display:none;">
      <div class="search-box">
        <input type="text" id="searchQuery" placeholder="ค้นหาเลข หรือ ชื่อลูกค้า...">
        <button class="btn-search" onclick="searchData()">ค้นหา</button>
      </div>
      <div id="searchResults" class="table-container"></div>
      
      <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eee;">
      
      <h3 style="font-size: 16px; margin-bottom: 10px; color: var(--primary);">🔥 เลขยอดนิยม (เรียงตามยอดซื้อ)</h3>
      <div id="topNumbersList"></div>
      <button class="btn-submit" style="background: var(--accent); font-size: 14px; padding: 10px;" onclick="loadTopNumbers()">โหลดเลขยอดนิยม</button>
    </div>
  </div>
</div>

<div id="toast"></div>

<script>
  const API_URL = "https://script.google.com/macros/s/AKfycbwU0Bk4XlVJ1T2kUlcuQEmTsXO9x9CVCgL87R2AQCzuH9UsqT6qLSfFjAAJOF2UY37l/exec";

  function showTab(tabName) {
    document.querySelectorAll('.tab-content').forEach(t => t.style.display = 'none');
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('tab-' + tabName).style.display = 'block';
    event.currentTarget.classList.add('active');
  }

  async function submitData() {
    const btn = document.getElementById('submitBtn');
    const payload = {
      customerName: document.getElementById('customerName').value,
      number: document.getElementById('number').value,
      type: document.getElementById('type').value,
      top: document.getElementById('top').value || 0,
      bottom: document.getElementById('bottom').value || 0,
      tod: document.getElementById('tod').value || 0,
      limitPrice: document.getElementById('limitPrice').value,
      note: document.getElementById('note').value
    };

    if (!payload.customerName || !payload.number) {
      showToast("กรุณากรอกชื่อลูกค้าและเลขที่ซื้อ");
      return;
    }

    btn.disabled = true;
    btn.innerText = "กำลังบันทึก...";

    try {
      await fetch(API_URL, {
        method: "POST",
        mode: "no-cors",
        body: JSON.stringify(payload)
      });
      showToast("บันทึกสำเร็จ ✓");
      resetForm();
    } catch (e) {
      showToast("เกิดข้อผิดพลาดในการบันทึก");
    } finally {
      btn.disabled = false;
      btn.innerText = "บันทึกข้อมูล";
    }
  }

  function resetForm() {
    document.getElementById('number').value = "";
    document.getElementById('top').value = "";
    document.getElementById('bottom').value = "";
    document.getElementById('tod').value = "";
    document.getElementById('number').focus();
  }

  async function loadSummary() {
    const body = document.getElementById('summaryBody');
    const loading = document.getElementById('summaryLoading');
    body.innerHTML = "";
    loading.style.display = "block";

    try {
      const res = await fetch(API_URL + "?action=getSummary");
      const json = await res.json();
      const data = json.data || [];

      data.forEach(item => {
        const row = document.createElement('tr');
        let colorClass = "";
        if (item.total >= 7000) colorClass = "bg-red";
        else if (item.total >= 4000) colorClass = "bg-yellow";
        else if (item.total >= 2000) colorClass = "bg-green";

        row.className = colorClass;
        row.innerHTML = `
          <td>${item.number}</td>
          <td>${fmt(item.top)}</td>
          <td>${fmt(item.bottom)}</td>
          <td>${fmt(item.tod)}</td>
          <td>${fmt(item.total)}</td>
        `;
        body.appendChild(row);
      });
    } catch (e) {
      showToast("โหลดข้อมูลสรุปไม่สำเร็จ");
    } finally {
      loading.style.display = "none";
    }
  }

  async function searchData() {
    const query = document.getElementById('searchQuery').value;
    const resultsDiv = document.getElementById('searchResults');
    if (!query) return;

    resultsDiv.innerHTML = "<div class='loading'>กำลังค้นหา...</div>";

    try {
      const res = await fetch(API_URL + "?action=search&query=" + encodeURIComponent(query));
      const json = await res.json();
      const data = json.data || [];

      if (data.length === 0) {
        resultsDiv.innerHTML = "<div class='loading'>ไม่พบข้อมูล</div>";
        return;
      }

      let html = `<table><thead><tr><th>วันที่</th><th>ลูกค้า</th><th>เลข</th><th>ประเภท</th><th>ยอดรวม</th></tr></thead><tbody>`;
      data.forEach(row => {
        html += `<tr>
          <td>${row.date}</td>
          <td>${row.customer}</td>
          <td>${row.number}</td>
          <td>${row.type}</td>
          <td>${fmt(row.total)}</td>
        </tr>`;
      });
      html += `</tbody></table>`;
      resultsDiv.innerHTML = html;
    } catch (e) {
      showToast("ค้นหาไม่สำเร็จ");
    }
  }

  async function loadTopNumbers() {
    const list = document.getElementById('topNumbersList');
    list.innerHTML = "<div class='loading'>กำลังวิเคราะห์...</div>";

    try {
      const res = await fetch(API_URL + "?action=getTopNumbers");
      const json = await res.json();
      const data = json.data || [];

      list.innerHTML = data.map((item, index) => `
        <div class="top-item">
          <span class="top-rank">${index + 1}.</span>
          <span class="top-num">${item.number}</span>
          <span class="top-total">${fmt(item.total)} บาท</span>
        </div>
      `).join("");
    } catch (e) {
      showToast("โหลดข้อมูลยอดนิยมไม่สำเร็จ");
    }
  }

  function fmt(n) {
    return Number(n).toLocaleString();
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.innerText = msg;
    toast.style.display = 'block';
    setTimeout(() => { toast.style.display = 'none'; }, 3000);
  }
</script>
</body>
</html>
